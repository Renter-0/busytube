name: Build and Release
on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: app-linux-x86_64.tar.gz
            archive_command: tar -czf

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_name: app-linux-aarch64.tar.gz
            archive_command: tar -czf

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: app-windows-x86_64.zip
            archive_command: 7z a -tzip

          - os: windows-latest
            target: i686-pc-windows-msvc
            archive_name: app-windows-i686.zip
            archive_command: 7z a -tzip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # rustup provides ARM64 Rust libraries; GCC supplies the Linux linker for the final executable.
      - name: Install ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build project
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Set binary name
        id: binary
        shell: bash
        run: |
          # Extract your project name from Cargo.toml (assumes standard format)
          PROJECT_NAME=$(grep -m1 "name" Cargo.toml | cut -d '"' -f2 | cut -d "'" -f2)
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            echo "BIN_NAME=${PROJECT_NAME}.exe" >> $GITHUB_OUTPUT
          else
            echo "BIN_NAME=${PROJECT_NAME}" >> $GITHUB_OUTPUT
          fi
          echo "PROJECT_NAME=${PROJECT_NAME}" >> $GITHUB_OUTPUT

      - name: Create archive
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ steps.binary.outputs.BIN_NAME }} release/
          cd release
          ${{ matrix.archive_command }} ../${{ matrix.archive_name }} ${{ steps.binary.outputs.BIN_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ matrix.archive_name }}
